services:
  web:
    build: .
    container_name: vaultchat_web
    restart: unless-stopped
    ports:
      - "3100:3000"
    env_file:
      - .env
    volumes:
      # Persist only the SQLite file — do not mount over /app/prisma (stale schema.prisma broke db push).
      - vaultchat_data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/prod.db

volumes:
  vaultchat_data:
